<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman Runner Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        #score {
            margin-bottom: 10px;
        }

        #timer {
            margin-bottom: 10px;
        }

        #coins {
            color: #FFD700;
            margin-bottom: 20px;
        }

        #abilities {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
            flex-wrap: wrap;
            max-width: 250px;
        }

        .ability-btn {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            border: 3px solid white;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .ability-btn:hover:not(.disabled) {
            background: rgba(0, 0, 0, 0.7);
            transform: scale(1.1);
        }

        .ability-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .ability-btn.active {
            background: #FFD700;
            color: black;
        }

        #gameOverScreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #gameOverScreen.show {
            display: flex;
        }

        .game-over-content {
            text-align: center;
            color: white;
        }

        .game-over-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #FF6B6B;
        }

        .game-over-content p {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .game-over-content button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .game-over-content button:hover {
            background: #45a049;
            transform: scale(1.1);
        }

        #mobileTouchPad {
            position: absolute;
            bottom: 110px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0, 0, 0, 0.3);
            border: 3px solid white;
            border-radius: 50%;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #touchIndicator {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }

        @media (max-width: 600px) {
            #ui {
                font-size: 18px;
            }
            
            .ability-btn {
                width: 60px;
                height: 60px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>
        <div id="ui">
            <div id="score">Время: 0s</div>
            <div id="timer">Здоровье: 3</div>
            <div id="coins">💰 Монеты: 0</div>
        </div>
        <div id="abilities">
            <button class="ability-btn" id="abilitySuper" title="Супер бег (Q)">⚡<br>Супер<br>бег</button>
            <button class="ability-btn" id="abilityFly" title="Полёт (W)">🕊️<br>Полёт</button>
            <button class="ability-btn" id="abilityStun" title="Силач (E)">💪<br>Силач</button>
        </div>
        <div id="mobileTouchPad">
            <div id="touchIndicator"></div>
        </div>
        <div id="gameOverScreen">
            <div class="game-over-content">
                <h1>GAME OVER!</h1>
                <p id="finalScore">Время: 0s</p>
                <p id="finalCoins">Монеты: 0</p>
                <button onclick="location.reload()">Играть снова</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
